<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Memories</title>
    <style>
        /* The Aesthetic Styling */
        body {
            background-color: #5f9ea0; /* Muted Pastel Blue */
            color: #2f4f4f;
            font-family: "Times New Roman", Times, serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Prevents the whole page from scrolling */
            touch-action: none; /* Helps mobile stay focused on the swipe */
        }

        h1 {
            font-style: italic;
            font-weight: lighter;
            margin-bottom: 20px;
            letter-spacing: 1px;
            z-index: 10;
        }

       .gallery-container {
        position: relative;
        width: 85%;
        max-width: 350px;
        height: 450px;
        perspective: 1000px;
    }

    .card {
        position: absolute;
        width: 100%;
        height: 100%;
        background: #2f4f4f;
        padding: 15px;
        box-sizing: border-box;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        border: 1px solid rgba(0,0,0,0.05);
        transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.6s;
        cursor: grab;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .card img {
        width: 100%;
        height: auto;
        object-fit: contain;
    }

    /* This class is added via JS to slide the top card away */
    .slide-out {
        transform: translateX(-150%) rotate(-20deg) !important;
        opacity: 0;
    }

    .hint {
        margin-top: 30px;
        font-size: 0.8rem;
        font-style: italic;
        opacity: 0.6;
    }
</style>

<body>
    <h1>Para el amor de mi vida</h1>
    <h1>Gracias por los mejores 5 meses de mi vida</h1>

    <div class="gallery-container" id="gallery">
        <div class="card" id="next-card">
            <img id="next-img" src="" alt="">
        </div>
        <div class="card" id="current-card">
            <img id="current-img" src="" alt="">
        </div>
    </div>

    <p class="hint">Swipe left to see another memory</p>
</body>
<script>
    const images = [
        "https://lh3.googleusercontent.com/d/1apn9NGimmMyQyAFZYqVbSe3NRlz3gTeN",
        "https://lh3.googleusercontent.com/d/1p2MFyw2komvkF4nuFNUg0Arfnno6D-B2",
        "https://lh3.googleusercontent.com/d/1of9rteiIGTOj4CfBqK4Cs_Pvci1foQKt",
        "https://lh3.googleusercontent.com/d/1aG2O5C4LZUDuq2-pDLns-dI0DRa4rXXO",
        "https://lh3.googleusercontent.com/d/1vyePJhyi2SDdkt3vl85mwK6GHvPfGOWP",
        "https://lh3.googleusercontent.com/d/1ipTrm03-WirpHySEN_rY4l5K-O3sIo4f",
        "https://lh3.googleusercontent.com/d/1ea_rHFhPJLrtaEaWTO1tyV_S9WV2dK8O",
        "https://lh3.googleusercontent.com/d/1ALaErLPpdHaof2ydx2KekmL0vKj2znkE",
        "https://lh3.googleusercontent.com/d/1RJgdMrXnqhHjnXuvqKtC9JNcb_O7A36q",
        "https://lh3.googleusercontent.com/d/1ub-5bEYEWk2-Wk5iaeqye7X7H-sZCv-L",
        "https://lh3.googleusercontent.com/d/1YBzc3dm4qWFVk5rg5ge-9U2jU2j0Hzcd",
        "https://lh3.googleusercontent.com/d/1YDHsEH4KKLtzceV1UGURqnHeQcJ4BVZv",
        "https://lh3.googleusercontent.com/d/1FJ4QxERFDklY3mluTP2qGwlOwZVEY_uz",
        "https://lh3.googleusercontent.com/d/1FrAVsm9Nif38QaoPQ6pGdqn3VwzVV2Nt",
        "https://lh3.googleusercontent.com/d/115EzN6Awh-TaebzYihZb01RMFdu2Fojz",
        "https://lh3.googleusercontent.com/d/1PQ8c5nx7vppA5D8ZLKBIVdMauXW8rfUx",
        "https://lh3.googleusercontent.com/d/1wLjO7vXjiXJXaTTtrX4wVVs13CI3jEIa",
        "https://lh3.googleusercontent.com/d/1I1zkAg0igHK7Hx2BU7V_44k0JydGT7tq"
    ];

    let startX = 0;
    const currentCard = document.getElementById('current-card');
    const nextCard = document.getElementById('next-card');
    const currentImg = document.getElementById('current-img');
    const nextImg = document.getElementById('next-img');

    function getRandomImg() {
        return images[Math.floor(Math.random() * images.length)];
    }

    function init() {
        currentImg.src = getRandomImg();
        nextImg.src = getRandomImg();
    }

    // Swipe Logic
    document.addEventListener('touchstart', e => {
        startX = e.touches[0].clientX;
    });

    document.addEventListener('touchend', e => {
        let endX = e.changedTouches[0].clientX;
        if (startX - endX > 50) { // Swiped Left
            swipe();
        }
    });

    function swipe() {
        currentCard.classList.add('slide-out');
        
        // Wait for animation to finish, then reset cards
        setTimeout(() => {
            currentImg.src = nextImg.src; // Move background image to front
            currentCard.classList.remove('slide-out'); // Bring card back instantly
            nextImg.src = getRandomImg(); // Load a new random image in the back
        }, 600);
    }

    window.onload = init;
</script>
</body>
</html>
