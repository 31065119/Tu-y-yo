<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Memories</title>
    <style>
        /* The Aesthetic Styling */
        body {
            background-color: #ad9887; /* Muted Pastel Blue */
            color: #1c1004;
            font-family: "Times New Roman", Times, serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden; /* Prevents the whole page from scrolling */
            touch-action: none; /* Helps mobile stay focused on the swipe */
        }

        h1 {
            font-style: italic;
            font-weight: lighter;
            margin-bottom: 20px;
            letter-spacing: 1px;
            z-index: 10;
        }

       .gallery-container {
            position: relative;
            width: 85%;
            max-width: 350px;
            height: 450px;
            perspective: 1000px;
        }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #faf4eb;
            padding: 15px 15px 40px 15px; /* Extra padding at the bottom (40px) */
            box-sizing: border-box;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08); 
            border: 1px solid rgba(0, 0, 0, 0.03);
            transition: transform 1.2s cubic-bezier(0.23, 1, 0.32, 1), opacity 1.2s;
            cursor: grab;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* Aligns content to the top */
            align-items: center;
        }

        .card img {
            width: 100%;
            height: 80%; /* Takes up the top 80% of the card */
            object-fit: cover; /* This makes the photos look uniform and neat */
            border-radius: 1px;
        }

        .card-text {
            margin-top: auto; /* Pushes text to the very bottom of the flex container */
            font-family: "Times New Roman", Times, serif;
            font-size: 1.2rem;
            color: #1c1004;
            padding-bottom: 5px;
        }

        /* This class is added via JS to slide the top card away */
        .slide-out {
            transform: translateX(-150%) rotate(-20deg) !important;
            opacity: 0;
        }

        .hint {
            margin-top: 30px;
            font-size: 0.8rem;
            opacity: 0.6;
        }
</style>

<body>
    <h1>Para el amor de mi vida</h1>
    <h1>Gracias por los mejores 5 meses de mi vida</h1>

   <div class="gallery-container" id="gallery">
        <div class="card" id="next-card">
            <img id="next-img" src="" alt="">
            <div class="card-text">Te amo con locura</div>
        </div>
        <div class="card" id="current-card">
            <img id="current-img" src="" alt="">
            <div class="card-text">Te amo con locura</div>
        </div>
    </div>
    
    <p class="hint">Swipe to see a memory of us</p>
</body>
    
<script>
    const images = [
        "https://lh3.googleusercontent.com/d/1Y5rDX6JbrorbssiZcFBAe0Jj4O5vOpxQ",
        "https://lh3.googleusercontent.com/d/1wb9jIi4iY49nZ2nyXp1NyGpQZLWGT7Th",
        "https://lh3.googleusercontent.com/d/1uiqKEhslxTtFCiKeULcnUjJAFruIA5nf",
        "https://lh3.googleusercontent.com/d/1kGkim5HdcyMqsPtxybD3pSAMBs_qwrkK",
        "https://lh3.googleusercontent.com/d/1iNx6JCeqw53kviSiFswXpwHQsqB6JbHZ",
        "https://lh3.googleusercontent.com/d/1ePO6l_bBpui69wIxZ3l6Ys_rl5Nr9iLd",
        "https://lh3.googleusercontent.com/d/1c_XgCxhYere3ufZiNxfv3gD9pTi_Nl9b",
        "https://lh3.googleusercontent.com/d/1ZuDa_i7Ihsd3woYFNszYe0yPdFGiS6dj",
        "https://lh3.googleusercontent.com/d/1TZzyCtZf_r6E_gWxH5TLwdoUxlLxcDhl",
        "https://lh3.googleusercontent.com/d/1NaDSKzfkEZs4C_Pr_kMYh55jDnkuLtGw",
        "https://lh3.googleusercontent.com/d/1IhpJcNJ3PqhLeRd3fDLQsJSvbKqdZwuw",
        "https://lh3.googleusercontent.com/d/1I2lF9m-LfjlP2-Z0Q0VnGb2-DSzmp3dS",
        "https://lh3.googleusercontent.com/d/1Ex27zvGNpp_X4E7z1lX701bqxqBAvFmx",
        "https://lh3.googleusercontent.com/d/1DEPrYS4QmnwwTjk-5mZH7nDVOu9hWtTI",
        "https://lh3.googleusercontent.com/d/18uaBhjZFkdXyGThjAp6qH-OheFeiXB9R",
        "https://lh3.googleusercontent.com/d/14CeSyldHwzEL2mPdfcZnZqwyTgHCxjUi",
        "https://lh3.googleusercontent.com/d/139jHAc1Bm_pZzfMlVwrBnAIAG8GeI5sK",
        "https://lh3.googleusercontent.com/d/117mx1RCyt4oT_g-WFoN7IptRuklzeM1A",
        "https://lh3.googleusercontent.com/d/1OLRugJxL49Skfyioe9vnzQ5jKsaBIaY7"
    ];
    let startX = 0;
    const currentCard = document.getElementById('current-card');
    const nextCard = document.getElementById('next-card');
    const currentImg = document.getElementById('current-img');
    const nextImg = document.getElementById('next-img');

    function getRandomImg() {
        return images[Math.floor(Math.random() * images.length)];
    }

    function init() {
        currentImg.src = getRandomImg();
        nextImg.src = getRandomImg();
    }

    // Swipe Logic
    document.addEventListener('touchstart', e => {
        startX = e.touches[0].clientX;
    });

    document.addEventListener('touchend', e => {
        let endX = e.changedTouches[0].clientX;
        if (startX - endX > 50) { // Swiped Left
            swipe();
        }
    });

    function swipe() {
        // 1. Slide the top card away
        currentCard.classList.add('slide-out');
        
        // 2. Wait for the slide animation to get far enough away
        setTimeout(() => {
            // 3. Update the front image to match the one that was waiting behind it
            currentImg.src = nextImg.src; 
            
            // 4. Momentarily disable the transition so it "teleports" back without sliding
            currentCard.style.transition = 'none';
            currentCard.classList.remove('slide-out');
            
            // 5. Load the NEXT random image into the hidden back card
            nextImg.src = getRandomImg();

            // 6. Force a tiny pause, then turn the transition back on for the next swipe
            
            currentImg.src = nextImg.src; 
            currentCard.classList.remove('slide-out'); 
            nextImg.src = getRandomImg(); 
        }, 1200); // This happens while the card is off-screen
    }

    window.onload = init;
</script>
</body>
</html>
